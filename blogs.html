<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aynu the Game Dev | Dev Blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png">
  <style>
    #blogs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 400px));
      gap: 20px;
      justify-content: center;
      padding: 50px 0;
    }
    .blog-card {
      border: 2px solid #000;
      border-radius: 12px;
      background-color: #f9f9f9;
      padding: 20px;
      text-align: left;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .blog-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }
    .blog-card h3 { margin-bottom: 10px; font-size: 1.3rem; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
    .blog-card p { margin: 8px 0; font-size: 1rem; }
    .blog-card a { color: #0077ff; text-decoration: none; }
    .blog-card a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1 class="animated-header">
        <span class="left">Aynu</span><span class="bar">|</span><span class="right">Dev Blog</span>
      </h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="blogs.html">Blog</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="some_links.html">Links</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section id="hero">
    <div class="container">
      <h2>Blogs</h2>
      <p>Check out my latest updates, dev logs, and projects!</p>
    </div>
  </section>

  <section id="blogs-grid" class="container">
    <div class="blog-card">
      <h3>Possible Update for LOL Machine 3000 and Boomloop</h3>
      <p><em>1 Oct 2025</em></p>
      <p>I’ve received feedback on these two projects and may do a future update.</p>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2025 Aynu the Game Dev. All Rights Reserved.</p>
    </div>
  </footer>
</body>
</html>
